<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25초 숫자 스피드 게임</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f5fb;
padding:20px;
}

h1{
font-size:34px;
margin-bottom:15px;
}

.info{
font-size:20px;
margin:6px;
}

#startButton{
margin-top:10px;
padding:12px 26px;
font-size:22px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
cursor:pointer;
}

#gameBoard{
max-width:420px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.num-btn{
height:60px;
font-size:22px;
border:none;
border-radius:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
cursor:pointer;
}

.num-btn:disabled{
background:#c8e6c9;
color:#2e7d32;
}

#message{
font-size:24px;
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>25초 숫자 스피드 게임</h1>

<div class="info">남은 시간 : <span id="time">25</span></div>
<div class="info">다음 숫자 : <span id="target">1</span></div>
<div class="info">최고 기록 : <span id="bestTime">없음</span></div>

<button id="startButton">게임 시작</button>

<div id="gameBoard"></div>

<div id="message"></div>

<script>

const timeEl=document.getElementById("time")
const targetEl=document.getElementById("target")
const bestTimeEl=document.getElementById("bestTime")
const startButton=document.getElementById("startButton")
const board=document.getElementById("gameBoard")
const message=document.getElementById("message")

let current=1
let timeLeft=25
let timer=null
let startTime=0

const BEST_KEY="number_speed_best"

function loadBest(){

let t=localStorage.getItem(BEST_KEY)

if(t){
bestTimeEl.textContent=t+"초"
}else{
bestTimeEl.textContent="없음"
}

}

function saveBest(time){

localStorage.setItem(BEST_KEY,time)

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[arr[i],arr[j]]=[arr[j],arr[i]]

}

return arr

}

function createBoard(){

board.innerHTML=""

let numbers=[]

for(let i=1;i<=30;i++){

numbers.push(i)

}

shuffle(numbers)

numbers.forEach(num=>{

let btn=document.createElement("button")

btn.className="num-btn"

btn.textContent=num

btn.onclick=()=>clickNumber(num,btn)

board.appendChild(btn)

})

}

function clickNumber(num,btn){

if(num===current){

btn.disabled=true

current++

targetEl.textContent=current

if(current>30){

successGame()

}

}

}

function startGame(){

clearInterval(timer)

current=1
timeLeft=25

timeEl.textContent=timeLeft
targetEl.textContent=current

message.textContent=""

startButton.disabled=true

createBoard()

startTime=Date.now()

timer=setInterval(()=>{

timeLeft--

timeEl.textContent=timeLeft

if(timeLeft<=0){

failGame()

}

},1000)

}

function successGame(){

clearInterval(timer)

let endTime=Date.now()

let clearTime=((endTime-startTime)/1000).toFixed(2)

let best=localStorage.getItem(BEST_KEY)

if(!best || clearTime<best){

saveBest(clearTime)

loadBest()

message.textContent="새 최고기록! "+clearTime+"초"

}else{

message.textContent="성공! 기록 "+clearTime+"초"

}

startButton.disabled=false

}

function failGame(){

clearInterval(timer)

message.textContent="시간 종료!"

startButton.disabled=false

}

startButton.onclick=startGame

loadBest()

</script>

</body>
</html>
