<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25초 숫자 스피드 게임</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f5fb;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.info{
font-size:20px;
margin:8px;
}

#startButton{
margin-top:15px;
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:#3498db;
color:white;
}

#board{
max-width:420px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.num{
height:60px;
font-size:22px;
border:none;
border-radius:8px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.num:disabled{
background:#c8e6c9;
}

</style>
</head>

<body>

<h1>25초 숫자 스피드 게임</h1>

<div class="info">남은 시간 : <span id="time">25</span></div>
<div class="info">다음 숫자 : <span id="target">1</span></div>
<div class="info">최고 기록 : <span id="best">없음</span></div>

<button id="startButton">게임 시작</button>

<div id="board"></div>

<script>

let current=1
let time=25
let timer=null
let startTime=0

const timeEl=document.getElementById("time")
const targetEl=document.getElementById("target")
const board=document.getElementById("board")
const startButton=document.getElementById("startButton")
const bestEl=document.getElementById("best")

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[arr[i],arr[j]]=[arr[j],arr[i]]
}
}

function createBoard(){

board.innerHTML=""

let numbers=[]
for(let i=1;i<=30;i++){
numbers.push(i)
}

shuffle(numbers)

numbers.forEach(n=>{
let btn=document.createElement("button")
btn.className="num"
btn.textContent=n

btn.onclick=function(){

if(n===current){

btn.disabled=true
current++
targetEl.textContent=current

if(current>30){
clearInterval(timer)

let clear=(Date.now()-startTime)/1000

let best=localStorage.getItem("best")

if(!best||clear<best){
localStorage.setItem("best",clear)
bestEl.textContent=clear.toFixed(2)+"초"
alert("새 기록 "+clear.toFixed(2)+"초")
}else{
alert("성공 "+clear.toFixed(2)+"초")
}

}

}

}

board.appendChild(btn)

})

}

startButton.onclick=function(){

current=1
time=25

targetEl.textContent=current
timeEl.textContent=time

createBoard()

startTime=Date.now()

clearInterval(timer)

timer=setInterval(function(){

time--
timeEl.textContent=time

if(time<=0){
clearInterval(timer)
alert("시간 종료")
}

},1000)

}

let best=localStorage.getItem("best")
if(best){
bestEl.textContent=parseFloat(best).toFixed(2)+"초"
}

</script>

</body>
</html>
