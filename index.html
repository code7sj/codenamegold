<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10초 숫자 게임</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f3f4f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 20px;
      font-size: 40px;
    }

    .info {
      font-size: 22px;
      margin: 8px 0;
    }

    #startButton {
      margin-top: 18px;
      margin-bottom: 20px;
      padding: 14px 28px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #2196f3;
      color: white;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    #startButton:disabled {
      background: #9bbbd7;
      cursor: not-allowed;
    }

    #gameBoard {
      max-width: 430px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .num-btn {
      height: 62px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
    }

    .num-btn:disabled {
      background: #c8e6c9;
      color: #2e7d32;
      cursor: default;
    }

    #message {
      margin-top: 25px;
      min-height: 40px;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>10초 숫자 게임</h1>

  <div class="info">남은 시간: <span id="time">10</span></div>
  <div class="info">다음 숫자: <span id="target">1</span></div>

  <button id="startButton">게임 시작</button>

  <div id="gameBoard"></div>

  <div id="message"></div>

  <script>
    const timeEl = document.getElementById("time");
    const targetEl = document.getElementById("target");
    const startButton = document.getElementById("startButton");
    const gameBoard = document.getElementById("gameBoard");
    const messageEl = document.getElementById("message");

    let currentNumber = 1;
    let timeLeft = 10;
    let timer = null;
    let gameRunning = false;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createBoard() {
      gameBoard.innerHTML = "";

      const numbers = [];
      for (let i = 1; i <= 30; i++) {
        numbers.push(i);
      }

      shuffle(numbers);

      numbers.forEach((num) => {
        const button = document.createElement("button");
        button.className = "num-btn";
        button.textContent = num;

        button.addEventListener("click", () => {
          if (!gameRunning) return;

          if (num === currentNumber) {
            button.disabled = true;
            currentNumber++;
            targetEl.textContent = currentNumber <= 30 ? currentNumber : "완료";

            if (currentNumber > 30) {
              endGame(true);
            }
          }
        });

        gameBoard.appendChild(button);
      });
    }

    function startGame() {
      if (timer) {
        clearInterval(timer);
      }

      currentNumber = 1;
      timeLeft = 10;
      gameRunning = true;

      timeEl.textContent = timeLeft;
      targetEl.textContent = currentNumber;
      messageEl.textContent = "";
      startButton.disabled = true;

      createBoard();

      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame(false);
        }
      }, 1000);
    }

    function endGame(success) {
      clearInterval(timer);
      timer = null;
      gameRunning = false;
      startButton.disabled = false;

      if (success) {
        messageEl.textContent = "성공! 30까지 모두 눌렀어요!";
      } else {
        messageEl.textContent = "시간 종료! 다시 도전!";
      }
    }

    startButton.addEventListener("click", startGame);
  </script>

</body>
</html>
